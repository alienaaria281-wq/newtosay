<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>

    <!-- Twitter Card Meta Tags (Large Image Card) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@glamonchat">
    <meta name="twitter:title" content="Chat on WhatsApp - Click Here">
    <meta name="twitter:description" content="Click here to join the chat and get live updates instantly!">
    
    <!-- Direct Image Link from your Imgur Album -->
    <meta name="twitter:image" content="https://i.imgur.com/kkGe73T.jpeg">

    <!-- Open Graph Tags (For Mobile & Other Social Media) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Chat on WhatsApp - Click Here">
    <meta property="og:description" content="Click here to join the chat and get live updates instantly!">
    <meta property="og:image" content="https://i.imgur.com/kkGe73T.jpeg">
    <meta property="og:url" content="https://glamonchat.com">

    <!-- Instant JavaScript Redirect -->
    <script type="text/javascript">
        window.location.href = "https://glamonchat.com";
    </script>

    <!-- Fallback Meta Redirect (Agar JS disabled ho) -->
    <meta http-equiv="refresh" content="0;url=https://glamonchat.com">
</head>
<body>
    <p>If you are not redirected automatically, <a href="https://glamonchat.com">click here</a>.</p>
</body>
</html>
